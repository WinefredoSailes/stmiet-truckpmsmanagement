<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Truck PMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'favicon-truck-pms.png' %}">
    <style>
        body {
            background: linear-gradient(135deg, #1a2035 0%, #2d3a5c 50%, #3b5998 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0,0,0,.3);
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            padding: 2rem 2rem 0;
        }
        .login-header i {
            font-size: 3rem;
            color: #2d3a5c;
        }
        .login-body {
            padding: 2rem;
        }
        .btn-primary {
            background: #2d3a5c;
            border-color: #2d3a5c;
        }
        .btn-primary:hover {
            background: #1a2035;
            border-color: #1a2035;
        }
        .form-control:focus {
            border-color: #2d3a5c;
            box-shadow: 0 0 0 .2rem rgba(45,58,92,.25);
        }
        #login-loader {
            position: fixed; inset: 0; z-index: 99999;
            background: rgba(26,32,53,.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #login-loader img {
            width: 64px; height: 64px;
            animation: spin 1s linear infinite;
        }
        #login-loader span {
            color: #fff; margin-top: 1rem; font-size: .9rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="login-loader">
        <img src="{% static 'favicon-truck-pms.png' %}" alt="Loading">
        <span>Logging in...</span>
    </div>
    <div class="login-card card">
        <div class="login-header">
            <i class="bi bi-truck-front-fill"></i>
            <h4 class="mt-2 fw-bold">Truck PMS & Servicing</h4>
            <p class="text-muted small">Sign in to your account</p>
        </div>
        <div class="login-body">
            <form method="post" onsubmit="var f=this;document.getElementById('login-loader').style.display='flex';setTimeout(function(){f.submit()},300);return false">
                {% csrf_token %}
                {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                    Invalid username or password.
                </div>
                {% endif %}
                <div class="mb-3">
                    <label class="form-label small fw-medium">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-medium">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted small fst-italic mb-0">
                    <i class="bi bi-quote me-1"></i>Commit to the LORD whatever you do,<br>and He will establish your plans.<br>
                    <span class="text-secondary">— Proverbs 16:3</span>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
