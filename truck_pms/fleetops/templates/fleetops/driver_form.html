{% extends 'core/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block back_link %}<a href="{% url 'fleetops:driver_list' %}" class="btn btn-sm btn-outline-secondary me-2"><i class="bi bi-arrow-left"></i></a>{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ driver.name|default:'' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">License Number *</label>
                    <input type="text" name="license_number" class="form-control" value="{{ driver.license_number|default:'' }}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">License Expiry *</label>
                    <input type="date" name="license_expiry" class="form-control" value="{{ driver.license_expiry|date:'Y-m-d'|default:'' }}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" value="{{ driver.age|default:'' }}" min="0">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2">{{ driver.address|default:'' }}</textarea>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Mobile</label>
                    <input type="text" name="mobile" class="form-control" value="{{ driver.mobile|default:'' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Notes</label>
                    <input type="text" name="notes" class="form-control" value="{{ driver.notes|default:'' }}">
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
                <a href="{% url 'fleetops:driver_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
