{% extends 'core/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block back_link %}<a href="{% url 'fleetops:assignment_list' %}" class="btn btn-sm btn-outline-secondary me-2"><i class="bi bi-arrow-left"></i></a>{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Driver *</label>
                    <select name="driver" class="form-select" required>
                        <option value="">-- select --</option>
                        {% for d in drivers %}
                        <option value="{{ d.pk }}">{{ d.name }} ({{ d.license_number }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Truck *</label>
                    <select name="truck" class="form-select" required>
                        <option value="">-- select --</option>
                        {% for t in trucks %}
                        <option value="{{ t.pk }}">{{ t.unit_number }} — {{ t.plate_number }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Start Date *</label>
                    <input type="date" name="assigned_from" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">End Date</label>
                    <input type="date" name="assigned_until" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <input type="text" name="notes" class="form-control">
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
                <a href="{% url 'fleetops:assignment_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
